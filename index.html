<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEJRA - Clima e Ecossistema</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Painel Meteorológico Integrado - CEJRA</h1>
    <button id="dark-mode-toggle" class="btn-toggle">🌙 Modo Escuro</button>
  </header>

  <main>
    <section class="busca-container">
      <form id="form-busca">
        <input type="text" id="input-cidade" placeholder="Digite uma cidade (Ex: Canarana)..." required>
        <button type="submit" id="btn-buscar">Buscar Clima</button>
      </form>
      <button id="btn-geo">📍 Usar Minha Localização</button>
    </section>

    <div id="loading" class="hidden">Carregando dados meteorológicos...</div>
    <div id="mensagem-erro" class="hidden"></div>

    <div class="dashboard-grid">
      <section id="clima-atual" class="card hidden">
        <h2>Clima Agora em <span id="nome-cidade">-</span></h2>
        <div class="clima-info">
          <div id="clima-icone"></div>
          <p class="temperatura"><span id="temp-valor">0</span>°C / <span id="temp-f">0</span>°F</p>
          <p id="clima-descricao">-</p>
        </div>
        <div class="detalhes-grid">
          <p>Umidade: <span id="umidade-valor">0</span>%</p>
          <p>Vento: <span id="vento-valor">0</span> km/h</p>
        </div>
      </section>

      <section id="historico" class="card">
        <h3>Cidades Pesquisadas</h3>
        <ul id="lista-historico"></ul>
        <button id="btn-limpar-historico">Limpar Histórico</button>
      </section>
    </div>
  </main>

  <footer>
    <p>© 2026 Trabalho Prático de Desenvolvimento de Software 1.</p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
